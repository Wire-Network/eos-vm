name: Pull Request

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-and-test:
    name: ${{ matrix.name }} | Build and Test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04
            runner: ubuntu-24.04
          - name: macOS 26
            runner: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ccache
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y ccache
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install ccache
          fi

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Configure
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: >
          cmake
          -S .
          -B build
          -DCMAKE_TOOLCHAIN_FILE=./vcpkg/scripts/buildsystems/vcpkg.cmake
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_TESTS=ON
          -DENABLE_SPEC_TESTS=ON
          -DENABLE_CCACHE=ON

      - name: Set parallelism
        run: |
          if command -v nproc >/dev/null 2>&1; then
            jobs="$(nproc)"
          else
            jobs="$(sysctl -n hw.ncpu)"
          fi
          echo "CI_JOBS=${jobs}" >> "${GITHUB_ENV}"

      - name: Build
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: cmake --build build --parallel "${CI_JOBS}"

      - name: ccache stats
        if: always()
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: ccache --show-stats

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel "${CI_JOBS}"
